openapi: "3.0.3"
info:
  title: "Swagger Petstore"
  version: "1.0.0"
servers:
  - url: "https://petstore.swagger.io/api/v3"
paths:
  /pet:
    post:
      operationId: addPet
      summary: "Add a new pet to the store"
      parameters:
        - name: storeId
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                status:
                  type: string
                  enum: [available, pending, sold]
      responses:
        "200":
          description: "Successful operation"
        "405":
          description: "Invalid input"
  /pet/{petId}:
    get:
      operationId: getPetById
      summary: "Find pet by ID"
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Successful operation"
        "404":
          description: "Pet not found"
  /pet/findByStatus:
    get:
      operationId: findPetsByStatus
      summary: "Finds pets by status"
      parameters:
        - name: status
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Successful operation"